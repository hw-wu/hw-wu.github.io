short_bio: >-
  <p>
    I am a Ph.D. candidate in Geomechanics within the Department of Civil and Environmental Engineering at Northwestern University.
  </p>
  <p>
    My research leverages advanced computational modeling—including Discrete Element Methods (DEM) and Finite Element Methods (FEM)—to understand the fundamental mechanics and complex behaviors of porous media across different scales, with applications spanning natural and engineered systems.
  </p>
  <p>
    Broadly, my research interests encompass <strong>Geomaterials</strong> and <strong>Polymer gels</strong>.
  </p>

